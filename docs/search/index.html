<!DOCTYPE html>
<html lang="en">

  <meta name="description" content="Search articles, perspectives, and more on Everything in Perspective">

  <style>

    h1, h2, h3 { font-family: Georgia, Garamond, serif; font-weight: 400; }

</head>
<body class="bg-secondary text-primary">
  <!-- Header -->
  <header class="border-b border-accent bg-secondary sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
      <div class="flex justify-between items-start">
        <a href="/" class="text-2xl sm:text-4xl font-serif font-bold tracking-tight">Everything in Perspective</a>
      </div>
      <!-- Search Bar -->
      <div class="mt-6">
        <input type="text" id="search-query" placeholder="Search articles, perspectives, and more..." 
          class="w-full px-4 py-2 border border-accent bg-secondary text-primary" 
          value="">
        <p id="search-status" class="text-muted text-sm mt-2"></p>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-12 sm:py-16">
    <h1 class="text-3xl font-serif font-bold mb-8">Search Results</h1>
    
    <!-- Results Container -->
    <div id="results-container" class="space-y-8">
      <p class="text-muted">Enter a search term above to get started.</p>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-accent text-secondary mt-24 py-12 border-t border-primary">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center text-xs text-secondary">
      <p>&copy; 2026 Everything in Perspective. All rights reserved.</p>
    </div>
  </footer>

  <script>
    // Load search index
    const searchIndex = [{"id":"article-gemini-ai-competition","title":"Gemini and the AI Landscape: Beyond ChatGPT's First-Mover Advantage","description":"ChatGPT won the public narrative. But the actual AI competition is far more nuanced—and OpenAI's dominance is fragile. What Gemini, Claude, and others are doing differently.","type":"article","url":"/everythinginperspective_purejs/magazine/article/gemini-ai-competition/","author":"Staff","date":"2026-05-06"},{"id":"article-google-maps-privacy-urban","title":"Google Maps: How Location Data Reshapes Urban Planning, Privacy, and Power","description":"Google Maps promised directions. It delivered unprecedented surveillance of human movement. What location data reveals—and who has access to it.","type":"article","url":"/everythinginperspective_purejs/magazine/article/google-maps-privacy-urban/","author":"Staff","date":"2026-05-06"},{"id":"article-instagram-mental-health","title":"Instagram and Mental Health: The Hidden Cost of Connection","description":"Instagram promised connection. Instead, it delivered comparison, anxiety, and algorithmic manipulation. What research actually shows—and what the platform doesn't want you to know.","type":"article","url":"/everythinginperspective_purejs/magazine/article/instagram-mental-health/","author":"Staff","date":"2026-05-06"},{"id":"article-crickets-global-obsession","title":"Cricket's Global Obsession: Sport as Cultural Identity and Economic Power","description":"Why 3 billion people follow cricket—not as sport, but as cultural identity. How cricket became the largest sport by audience, revenue, and geopolitical influence.","type":"article","url":"/everythinginperspective_purejs/magazine/article/crickets-global-obsession/","author":"Staff","date":"2026-05-05"},{"id":"article-ecommerce-giants-market-dominance","title":"E-Commerce Giants: How Amazon and Flipkart Reshaped Retail and Labor","description":"From disruption to dominance—how Amazon and Flipkart conquered retail markets, destroyed traditional merchants, and created a new underclass of gig workers.","type":"article","url":"/everythinginperspective_purejs/magazine/article/ecommerce-giants-market-dominance/","author":"Staff","date":"2026-05-05"},{"id":"article-gold-inflation-hedge","title":"Gold as Inflation Hedge: When Precious Metals Matter (And When They Don't)","description":"Why gold remains valuable in uncertain economies—not as get-rich-quick, but as inflation protection. Historical data, current context, and when to actually buy.","type":"article","url":"/everythinginperspective_purejs/magazine/article/gold-inflation-hedge/","author":"Staff","date":"2026-05-05"},{"id":"article-restaurant-culture-post-pandemic","title":"Restaurant Culture Post-Pandemic: Community, Economics, and the Future of Dining","description":"How restaurants transformed during pandemic lockdowns and what the post-2024 landscape reveals about urban community, labor, and local economics.","type":"article","url":"/everythinginperspective_purejs/magazine/article/restaurant-culture-post-pandemic/","author":"Staff","date":"2026-05-05"},{"id":"article-satta-king-economic-desperation","title":"Why Satta King Traps Millions: The Economics of Desperation","description":"Understanding satta king's hold on millions—not as vice, but as rational choice under economic pressure. The systemic failures that make illegal gambling the only escape.","type":"article","url":"/everythinginperspective_purejs/magazine/article/satta-king-economic-desperation/","author":"Staff","date":"2026-05-05"},{"id":"article-streaming-wars-entertainment","title":"Streaming Wars: How Entertainment Distribution Reshapes Culture and Labor","description":"From Netflix disruption to streaming saturation—how on-demand video changed entertainment economics, collapsed piracy, and created an unsustainable content arms race.","type":"article","url":"/everythinginperspective_purejs/magazine/article/streaming-wars-entertainment/","author":"Staff","date":"2026-05-05"},{"id":"article-translation-globalization","title":"Translation and Globalization: How Breaking Language Barriers Reshapes Power","description":"From human translators to AI translation—how breaking language barriers reshapes economies, culture, and global power structures. What's gained, what's lost.","type":"article","url":"/everythinginperspective_purejs/magazine/article/translation-globalization/","author":"Staff","date":"2026-05-05"},{"id":"article-weather-climate-data-literacy","title":"The Weather Crisis: Climate Data You Need to Know (And Why You Don't)","description":"Climate change isn't a future threat—it's reshaping weather today. The data everyone ignores and why climate literacy matters more than carbon reduction rhetoric.","type":"article","url":"/everythinginperspective_purejs/magazine/article/weather-climate-data-literacy/","author":"Staff","date":"2026-05-05"},{"id":"perspective-chatgpt-in-perspective","title":"ChatGPT in Perspective","description":"Understanding ChatGPT's impact beyond the hype—historical context, labor implications, and systemic changes.","type":"perspective","url":"/everythinginperspective_purejs/magazine/perspective/chatgpt-in-perspective/","author":"Staff","date":"2026-05-04"},{"id":"book-thinking-fast-and-slow","title":"Thinking, Fast and Slow","description":"Explores the two systems of thought that drive the way we think—System 1, which is fast and intuitive, and System 2, which is slow and deliberate. Kahneman reveals the biases and heuristics that often lead us astray.","type":"book","url":"/everythinginperspective_purejs/magazine/book/thinking-fast-and-slow/","author":"Daniel Kahneman","date":"2026-05-07"},{"id":"page-privacy-policy","title":"Privacy Policy","description":"","type":"page","url":"/everythinginperspective_purejs/magazine/page/privacy-policy/","author":"Staff","date":"2026-05-07"},{"id":"page-terms-conditions","title":"Terms & Conditions","description":"","type":"page","url":"/everythinginperspective_purejs/magazine/page/terms-conditions/","author":"Staff","date":"2026-05-07"},{"id":"page-faq","title":"Frequently Asked Questions","description":"","type":"page","url":"/everythinginperspective_purejs/magazine/page/faq/","author":"Staff","date":"2026-05-07"},{"id":"page-cookie-policy","title":"Cookie Policy","description":"","type":"page","url":"/everythinginperspective_purejs/magazine/page/cookie-policy/","author":"Staff","date":"2026-05-07"},{"id":"page-contact-us","title":"Contact Us","description":"","type":"page","url":"/everythinginperspective_purejs/magazine/page/contact-us/","author":"Staff","date":"2026-05-07"},{"id":"page-about","title":"About Everything in Perspective","description":"Learn about our mission to provide context and nuance on global trends","type":"page","url":"/everythinginperspective_purejs/magazine/page/about/","author":"Staff","date":"2026-05-07"},{"id":"person-daniel-kahneman","title":"Daniel Kahneman","description":"","type":"person","url":"/everythinginperspective_purejs/magazine/person/daniel-kahneman/","author":"Staff","date":"2026-05-07"},{"id":"language-spanish","title":"Spanish (Español)","description":"Spanish is a Romance language spoken by over 500 million people worldwide, making it the second-most spoken language by number of native speakers. It is the official language of Spain and most countries in Central and South America.","type":"language","url":"/everythinginperspective_purejs/magazine/language/spanish/","author":"Staff","date":"2026-05-07"}];
    const searchInput = document.getElementById('search-query');
    const resultsContainer = document.getElementById('results-container');
    const searchStatus = document.getElementById('search-status');

    // Get query from URL params
    const params = new URLSearchParams(window.location.search);
    const query = params.get('q') || '';
    searchInput.value = query;

    // Search function
    function performSearch(searchTerm) {
      if (!searchTerm.trim()) {
        resultsContainer.innerHTML = '<p class="text-muted">Enter a search term to get started.</p>';
        searchStatus.textContent = '';
        return;
      }

      const lowerQuery = searchTerm.toLowerCase();
      const results = searchIndex.filter(item => {
        const titleMatch = (item.title || '').toLowerCase().includes(lowerQuery);
        const descMatch = (item.description || '').toLowerCase().includes(lowerQuery);
        const authorMatch = (item.author || '').toLowerCase().includes(lowerQuery);
        return titleMatch || descMatch || authorMatch;
      });

      // Update status
      searchStatus.textContent = `Found ${results.length} result${results.length !== 1 ? 's' : ''} for "${searchTerm}"`;

      // Render results
      if (results.length === 0) {
        resultsContainer.innerHTML = '<p class="text-muted">No results found. Try a different search term.</p>';
      } else {
        resultsContainer.innerHTML = results.map(item => `
          <div class="border border-accent p-6 rounded">
            <h2 class="font-serif text-2xl font-bold mb-2"><a href="${item.url}" class="hover:underline text-primary">${item.title}</a></h2>
            <p class="text-muted text-sm mb-3">
              <span class="inline-block bg-light px-2 py-1 rounded text-xs mr-2">${item.type}</span>
              ${item.author ? `By <strong>${item.author}</strong>` : ''} 
              ${item.date ? `• ${item.date}` : ''}
            </p>
            <p class="text-base mb-4">${item.description}</p>
            <a href="${item.url}" class="text-primary font-bold hover:underline">Read →</a>
          </div>
        `).join('');
      }
    }

    // Search on input change
    searchInput.addEventListener('keyup', (e) => {
      performSearch(searchInput.value);
      // Update URL
      const newUrl = searchInput.value 
        ? `?q=${encodeURIComponent(searchInput.value)}` 
        : '';
      window.history.replaceState({}, '', newUrl || location.pathname);
    });

    // Initial search if query exists
    if (query) performSearch(query);
  </script>
</body>
</html>
